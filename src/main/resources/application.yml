server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: mdeditor-springboot

  # SQLite Database
  datasource:
    url: jdbc:sqlite:classpath:mdeditor.db
    driver-class-name: org.sqlite.JDBC

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.community.dialect.SQLiteDialect

  thymeleaf:
    cache: false
    encoding: UTF-8
    mode: HTML
    prefix: classpath:/templates/
    suffix: .html

  # Internationalization
  messages:
    basename: messages
    encoding: UTF-8
    cache-duration: 3600
    fallback-to-system-locale: false

  # File upload
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# JWT Configuration
jwt:
  secret: yhj-mdeditor-secret-key-for-jwt-token-generation-2026
  expiration: 86400000 # 24 hours

# Export Configuration
export:
  pdf:
    page-size: A4
    margin: 10
  image:
    scale: 2
    format: PNG

# Default User Configuration
default:
  user:
    username: admin
    password: 123456
    email: admin@mdeditor.com

# Logging
logging:
  level:
    root: INFO
    com.yhj.mdeditor: DEBUG
    org.springframework.security: INFO